<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Niche Discovery Researcher</title>
<script data-goatcounter="https://spraysword.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0b0e1a;color:#e0d8ff;font-family:'Inter','Segoe UI',sans-serif;min-height:100vh}
.header{background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);padding:20px 32px;border-bottom:1px solid rgba(255,255,255,0.06)}
.header h1{font-weight:500;font-size:22px;color:#c8b8ff;letter-spacing:-0.3px}
.header p{color:#8878b0;font-size:13px;margin-top:2px}
.panels{display:flex;height:calc(100vh - 80px)}
.panel{flex:1;display:flex;flex-direction:column;border-right:1px solid rgba(255,255,255,0.06)}
.panel:last-child{border-right:none}
.panel-header{padding:10px 16px;font-size:13px;color:#8878b0;background:rgba(255,255,255,0.02);border-bottom:1px solid rgba(255,255,255,0.06);text-transform:uppercase;letter-spacing:0.5px}
.panel iframe{flex:1;width:100%;border:none;background:#fff}
@media(max-width:900px){.panels{flex-direction:column;height:auto}.panel{height:50vh;border-right:none;border-bottom:1px solid rgba(255,255,255,0.06)}}
</style>
</head>
<body>
<div class="header">
  <h1>YouTube Niche Discovery Researcher</h1>
  <p>Niche Keyword Analysis — Minecraft Meme &amp; Animation Ecosystem</p>
</div>
<div class="panels">
  <div class="panel">
    <div class="panel-header">Word Cloud</div>
    <iframe src="niche_wordcloud.html"></iframe>
  </div>
  <div class="panel">
    <div class="panel-header">Network Graph</div>
    <iframe src="graph_7plus7.html"></iframe>
  </div>
</div>
</body>
</html>
