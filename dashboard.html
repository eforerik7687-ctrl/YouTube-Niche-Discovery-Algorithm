<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Niche Discovery Researcher</title>
<script data-goatcounter="https://spraysword.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0b0e1a;color:#e0d8ff;font-family:'Inter','Segoe UI',sans-serif;min-height:100vh}
.header{background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);padding:20px 32px;border-bottom:1px solid rgba(255,255,255,0.06)}
.header h1{font-weight:500;font-size:22px;color:#c8b8ff;letter-spacing:-0.3px}
.header p{color:#8878b0;font-size:13px;margin-top:2px}
.header .actions{float:right;display:flex;gap:8px}
.header .actions button{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);color:#c8b8ff;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px}
.header .actions button:hover{background:rgba(255,255,255,0.15)}

.tabs{display:flex;gap:0;background:rgba(255,255,255,0.02);border-bottom:1px solid rgba(255,255,255,0.06)}
.tab{padding:10px 20px;font-size:13px;color:#8878b0;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s}
.tab:hover{color:#c8b8ff}
.tab.active{color:#c8b8ff;border-bottom-color:#c8b8ff}

.panel{display:none;height:calc(100vh - 130px)}
.panel.active{display:flex;flex-direction:column}
.panel iframe{flex:1;width:100%;border:none;background:#fff}
.panel-split{display:flex;flex:1;height:100%}
.panel-split > div{flex:1;display:flex;flex-direction:column;border-right:1px solid rgba(255,255,255,0.06)}
.panel-split > div:last-child{border-right:none}
.panel-split .panel-label{padding:8px 14px;font-size:11px;color:#8878b0;background:rgba(255,255,255,0.02);border-bottom:1px solid rgba(255,255,255,0.06);text-transform:uppercase;letter-spacing:0.5px}
.panel-split iframe{flex:1;width:100%;border:none;background:#fff}

/* Niche Manager */
.niche-manager{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-wrap:wrap;gap:12px;align-content:flex-start}
.niche-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:12px 14px;width:280px;transition:all 0.15s}
.niche-card.removed{opacity:0.3;border-color:rgba(255,80,80,0.3)}
.niche-card.removed .niche-title{text-decoration:line-through}
.niche-card .row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.niche-card .niche-title{font-weight:600;font-size:13px}
.niche-card .niche-meta{font-size:11px;color:#8878b0}
.niche-card .niche-kw{font-size:10px;color:#8878b0;margin-bottom:6px}
.niche-card .ch-list{font-size:11px;color:#a898c8;line-height:1.5}
.niche-card .ch-list a{color:#a898c8;text-decoration:none}
.niche-card .ch-list a:hover{color:#fff;text-decoration:underline}
.niche-card .btn-remove{background:rgba(255,80,80,0.1);border:1px solid rgba(255,80,80,0.2);color:#ff6060;padding:2px 8px;border-radius:4px;cursor:pointer;font-size:11px}
.niche-card .btn-remove:hover{background:rgba(255,80,80,0.2)}
.niche-card .btn-restore{background:rgba(80,255,80,0.1);border:1px solid rgba(80,255,80,0.2);color:#60ff60;padding:2px 8px;border-radius:4px;cursor:pointer;font-size:11px}

.export-section{margin-top:16px;padding:16px 20px;border-top:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.export-section button{background:rgba(200,184,255,0.1);border:1px solid rgba(200,184,255,0.2);color:#c8b8ff;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px}
.export-section button:hover{background:rgba(200,184,255,0.2)}
.export-section .info{color:#8878b0;font-size:12px}
.export-section .info span{color:#c8b8ff}
</style>
</head>
<body>
<div class="header">
  <h1>YouTube Niche Discovery Researcher</h1>
  <p id="subtitle">Niche Report — latest pipeline run</p>
  <div class="actions">
    <button onclick="document.querySelector('.tab[data-panel=manager]').click()">Manage Niches</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" data-panel="report" onclick="switchPanel('report')">Niche Report</div>
  <div class="tab" data-panel="graph" onclick="switchPanel('graph')">Network Graph</div>
  <div class="tab" data-panel="manager" onclick="switchPanel('manager');loadNicheManager()">Niche Manager</div>
</div>

<!-- Panel: Report + Graph side by side -->
<div id="panel-report" class="panel active">
  <div class="panel-split">
    <div>
      <div class="panel-label">Niche Report</div>
      <iframe src="niche_wordcloud.html"></iframe>
    </div>
    <div>
      <div class="panel-label">Network Graph</div>
      <iframe src="graph_expanded.html"></iframe>
    </div>
  </div>
</div>

<!-- Panel: Graph only -->
<div id="panel-graph" class="panel">
  <iframe src="graph_expanded.html"></iframe>
</div>

<!-- Panel: Niche Manager -->
<div id="panel-manager" class="panel">
  <div class="niche-manager" id="nicheManager"></div>
  <div class="export-section" id="exportSection">
    <button onclick="exportForSocialBlade()">Export Remaining for Social Blade</button>
    <span class="info">Channels: <span id="exportCount">0</span> | Niches: <span id="exportNicheCount">0</span></span>
  </div>
</div>

<script>
// Track removed niches
var removedNiches = new Set(JSON.parse(localStorage.getItem('removedNiches') || '[]'));

function switchPanel(name) {
  document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.getElementById('panel-' + name).classList.add('active');
  document.querySelector('.tab[data-panel="' + name + '"]').classList.add('active');
}

function loadNicheManager() {
  var container = document.getElementById('nicheManager');
  container.innerHTML = 'Loading...';

  // Try to fetch niche_data_for_llm.json first, fallback to cluster_report.json
  fetch('niche_data_for_llm.json')
    .then(function(r) { if (!r.ok) throw Error(); return r.json(); })
    .catch(function() { return fetch('cluster_report.json').then(function(r) { return r.json(); }); })
    .then(function(data) {
      // Normalize data format
      var niches = Array.isArray(data) ? data : (data.niches || []);
      if (!Array.isArray(niches)) {
        // Convert object to array
        niches = Object.keys(niches).map(function(k) { return {id: parseInt(k), channels: niches[k].channels, keywords: niches[k].keywords}; });
      }
      renderNicheList(niches);
    })
    .catch(function() {
      container.innerHTML = '<div style="color:#8878b0;padding:20px">No niche data found. Run the pipeline first.</div>';
    });
}

function renderNicheList(niches) {
  var container = document.getElementById('nicheManager');
  container.innerHTML = '';

  if (!niches || niches.length === 0) {
    container.innerHTML = '<div style="color:#8878b0;padding:20px">No niches available.</div>';
    return;
  }

  var totalCh = 0;
  niches.forEach(function(niche) {
    var nid = niche.id || 0;
    var chCount = niche.channel_count || (niche.channels ? niche.channels.length : 0);
    totalCh += chCount;
    var chList = niche.top_channels || (niche.channels ? niche.channels.slice(0, 3) : []);
    var kw = niche.keyword || (niche.keywords ? (niche.keywords[0] ? niche.keywords[0].keyword || '' : '') : '');
    var totalViews = niche.total_views || 0;

    var card = document.createElement('div');
    card.className = 'niche-card' + (removedNiches.has(String(nid)) ? ' removed' : '');
    card.id = 'niche-card-' + nid;

    var isRemoved = removedNiches.has(String(nid));
    if (isRemoved) totalCh -= chCount;

    card.innerHTML =
      '<div class="row">' +
        '<span class="niche-title">Niche ' + nid + '</span>' +
        '<span class="niche-meta">' + chCount + ' ch &middot; ' + fmtViews(totalViews) + '</span>' +
      '</div>' +
      '<div class="niche-kw">' + kw + '</div>' +
      '<div class="ch-list">' +
        chList.map(function(ch) {
          var name = ch.name || ch.channel_name || '';
          var cid = ch.channelId || ch.channel_id || '';
          var subs = ch.subs_display || ch.subs || '';
          if (cid) return '<a href="https://www.youtube.com/channel/' + cid + '" target="_blank">' + name + '</a> ' + subs;
          return name + ' ' + subs;
        }).join('<br>') +
      '</div>' +
      '<div class="row" style="margin-top:6px">' +
        (isRemoved
          ? '<button class="btn-restore" onclick="restoreNiche(' + nid + ')">Restore</button>'
          : '<button class="btn-remove" onclick="removeNiche(' + nid + ')">Remove</button>') +
      '</div>';

    container.appendChild(card);
  });

  updateExportCount(niches);
}

function removeNiche(nid) {
  removedNiches.add(String(nid));
  localStorage.setItem('removedNiches', JSON.stringify(Array.from(removedNiches)));
  document.getElementById('niche-card-' + nid).classList.add('removed');
  var btn = document.getElementById('niche-card-' + nid).querySelector('.btn-remove');
  btn.textContent = 'Restore';
  btn.className = 'btn-restore';
  btn.onclick = function() { restoreNiche(nid); };
  updateExportCount();
}

function restoreNiche(nid) {
  removedNiches.delete(String(nid));
  localStorage.setItem('removedNiches', JSON.stringify(Array.from(removedNiches)));
  document.getElementById('niche-card-' + nid).classList.remove('removed');
  var btn = document.getElementById('niche-card-' + nid).querySelector('.btn-restore');
  btn.textContent = 'Remove';
  btn.className = 'btn-remove';
  btn.onclick = function() { removeNiche(nid); };
  updateExportCount();
}

function updateExportCount(niches) {
  // Count from DOM
  var cards = document.querySelectorAll('#nicheManager .niche-card');
  var totalCh = 0, totalNiches = 0;
  cards.forEach(function(card) {
    if (!card.classList.contains('removed')) {
      totalNiches++;
      var meta = card.querySelector('.niche-meta');
      if (meta) {
        var match = meta.textContent.match(/(\d+)\s*ch/);
        if (match) totalCh += parseInt(match[1]);
      }
    }
  });
  document.getElementById('exportCount').textContent = totalCh;
  document.getElementById('exportNicheCount').textContent = totalNiches;
}

function exportForSocialBlade() {
  // Collect remaining channels from non-removed niches
  var channels = [];
  var nicheInfo = {};
  var cards = document.querySelectorAll('#nicheManager .niche-card');

  cards.forEach(function(card) {
    if (card.classList.contains('removed')) return;

    // Extract niche ID
    var titleEl = card.querySelector('.niche-title');
    if (!titleEl) return;
    var nid = titleEl.textContent.replace('Niche ', '');
    var kw = card.querySelector('.niche-kw');
    var keyword = kw ? kw.textContent.trim() : '';

    // Extract channels from the list
    var links = card.querySelectorAll('.ch-list a');
    var channels_in_niche = [];
    links.forEach(function(a) {
      var href = a.getAttribute('href') || '';
      var cid = href.replace('https://www.youtube.com/channel/', '');
      var name = a.textContent;
      if (cid && name) {
        channels.push({
          channel_name: name,
          channel_id: cid,
          niche_id: nid,
        });
        channels_in_niche.push({name: name, id: cid});
      }
    });
    nicheInfo[nid] = {keyword: keyword, channels: channels_in_niche};
  });

  // Build export payload
  var payload = {
    export_date: new Date().toISOString(),
    source: 'YouTube Niche Discovery',
    channels: channels,
    niches: nicheInfo,
    total_channels: channels.length,
    total_niches: Object.keys(nicheInfo).length,
  };

  // Download as JSON
  var blob = new Blob([JSON.stringify(payload, null, 2)], {type: 'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'niche_channels_for_socialblade.json';
  a.click();
  URL.revokeObjectURL(url);
}

function fmtViews(v) {
  if (v >= 1000000000) return (v / 1000000000).toFixed(1) + 'B';
  if (v >= 1000000) return (v / 1000000).toFixed(1) + 'M';
  if (v >= 1000) return (v / 1000).toFixed(1) + 'K';
  return v.toString();
}
</script>
</body>
</html>
