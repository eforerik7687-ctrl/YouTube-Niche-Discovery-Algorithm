var COLORS=["#6C5CE7", "#00CEC9", "#FF6B6B", "#FDCB6E", "#A29BFE", "#55EFC4", "#FF7675"];
var network=null;

function switchTab(n){
document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active')});
document.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active')});
document.querySelectorAll('.tab-btn')[n=='pools'?0:n=='graph'?1:2].classList.add('active');
document.getElementById('tab-'+n).classList.add('active');
if(n=='graph')initGraph();
}

function formatViews(n){if(n>=1e9)return (n/1e9).toFixed(1)+'B';if(n>=1e6)return (n/1e6).toFixed(0)+'M';if(n>=1e3)return (n/1e3).toFixed(0)+'K';return String(n);}

function renderPools(){
var g=document.getElementById('pools-grid');
if(!POOLS||POOLS.length===0){
g.innerHTML='<div class="empty-state">No traffic pools detected yet.<br><small>Try more seed videos to build a richer recommendation graph.</small></div>';
return;
}
g.innerHTML=POOLS.map(function(p,i){
var c=COLORS[i%COLORS.length];
var topVids=(p.top_videos||[]).slice(0,3).map(function(v){
var shortUrl='https://www.youtube.com/shorts/'+v.video_id;
var vt=v.title||'Untitled';
if(vt.length>45)vt=vt.substring(0,45)+'...';
return'<li><a href="'+shortUrl+'" target="_blank" style="color:#a29bfe;text-decoration:none;font-size:11px" title="'+formatViews(v.view_count||0)+' views">'+vt+'</a></li>';
}).join('');
var ch=(p.top_channels||[]).slice(0,3).map(function(x){return'<li>'+x.name+' ('+x.videos+' videos)</li>'}).join('');
var kw=(p.top_keywords||[]).slice(0,5).map(function(k){return'<span>'+k+'</span>'}).join('');
return'<div class="pool-card"><span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;background:'+c+';color:#fff">Pool '+p.pool_id+'</span><div class="pool-name">'+(p.name||'Pool '+p.pool_id)+'</div><div class="pool-meta"><span><strong>'+p.video_count+'</strong> videos</span><span><strong>'+formatViews(p.total_views)+'</strong> views</span></div><div class="pool-keywords">'+kw+'</div><div style="font-size:12px;color:#888;margin:8px 0"><strong>Top 3:</strong></div><ul class="pool-channels">'+topVids+'</ul><div style="font-size:12px;color:#888;margin:8px 0"><strong>Channels:</strong></div><ul class="pool-channels">'+ch+'</ul>'+(p.content_theme?'<div style="font-size:12px;color:#999;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.06)">'+p.content_theme+'</div>':'')+'</div>';
}).join('');
}

function initGraph(){
if(network)return;
var container=document.getElementById('graph-container');
var vidToPool={};
(POOLS||[]).forEach(function(p){(p.videos||[]).forEach(function(v){vidToPool[v]=p.pool_id-1;});});
var nPools=Math.max((POOLS||[]).length,5);
var nodes=new vis.DataSet((GRAPH_DATA.nodes||[]).map(function(n){
var pi=vidToPool[n.video_id]!=null?vidToPool[n.video_id]:-1;
var hue=(Math.max(pi,0)*360/nPools)%360;
var color=pi>=0?'hsl('+hue+',70%,55%)':'#ccc';
var s=Math.max(8,Math.min(24,4+Math.log10((n.view_count||1000)+1)*2));
return{id:n.video_id,label:(n.video_id||'?').substring(0,11),
title:'<b>'+(n.title||'?')+'</b><br>Channel: '+(n.channel||'?')+'<br>Views: '+formatViews(n.view_count||0),
size:s,color:color,font:{size:10,color:'#333'},borderWidth:1};
}));
var edges=new vis.DataSet((GRAPH_DATA.edges||[]).map(function(e){
return{from:e.source,to:e.target,value:e.weight||0.1,width:Math.max(0.5,(e.weight||0.1)*8),
title:'Weight: '+((e.weight||0).toFixed(4))+'<br>Count: '+(e.raw_count||1)+'<br>Dist: '+(e.min_distance||1),
arrows:{to:{enabled:true,scaleFactor:0.6}},color:{opacity:Math.min(0.7,(e.weight||0.1)*3+0.1)},smooth:{enabled:false}};
}));
network=new vis.Network(container,{nodes:nodes,edges:edges},{
physics:{solver:'barnesHut',barnesHut:{gravitationalConstant:-300,centralGravity:0.1,springLength:250,springConstant:0.02,damping:0.12},stabilization:{iterations:100},maxVelocity:15,minVelocity:0.1},
interaction:{hover:true,tooltipDelay:200,dragNodes:true,zoomView:true,navigationButtons:true},
edges:{smooth:{enabled:false}}});
network.once('stabilized',function(){network.setOptions({physics:{enabled:false}});});
network.on('click',function(p){if(p.nodes.length>0)window.open('https://www.youtube.com/shorts/'+p.nodes[0],'_blank');});
}

function renderData(){
var tb=document.getElementById('data-tbody');
if(!POOLS||POOLS.length===0){tb.innerHTML='<tr><td colspan="5" style="text-align:center;color:#666;padding:40px">No pools detected</td></tr>';return;}
tb.innerHTML=POOLS.map(function(p){
return'<tr><td>'+p.pool_id+'</td><td>'+(p.name||'')+'</td><td>'+p.video_count+'</td><td>'+formatViews(p.total_views)+'</td><td>'+((p.top_channels||[]).slice(0,3).map(function(c){return c.name}).join(', '))+'</td></tr>';
}).join('');
}

function exportJSON(){
var blob=new Blob([JSON.stringify({pools:POOLS,result:RESULT},null,2)],{type:'application/json'});
var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='traffic_pools.json';a.click();
}

renderPools();renderData();
</script></body></html>
