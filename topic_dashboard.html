<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>YT Shorts Topic Pools</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.6/dist/vis-network.min.js"></script>
<style>
/* ── Reset & Base ── */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,Roboto,Helvetica,Arial,sans-serif;background:linear-gradient(135deg,#0c0a1d 0%,#1a1040 40%,#0d1b2a 100%);color:#cfd8e3;min-height:100vh;line-height:1.5}

/* ── Header ── */
.hd{background:rgba(255,255,255,0.02);border-bottom:1px solid rgba(255,255,255,0.06);padding:28px 36px;backdrop-filter:blur(10px)}
.hd h1{font-size:30px;font-weight:800;letter-spacing:-0.5px;background:linear-gradient(135deg,#a78bfa 0%,#22d3ee 50%,#34d399 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:14px}
.hd .st{display:flex;gap:36px;flex-wrap:wrap;font-size:13px;color:#7080a0}
.hd .st .stat-item{display:flex;flex-direction:column;gap:2px}
.hd .st .stat-item .label{font-size:11px;text-transform:uppercase;letter-spacing:0.8px;color:#506080}
.hd .st .stat-item .value{font-size:18px;font-weight:700;color:var(--accent,#a78bfa)}

/* ── Tabs ── */
.tb{display:flex;gap:0;padding:0 36px;background:rgba(255,255,255,0.015);border-bottom:1px solid rgba(255,255,255,0.06);overflow-x:auto;-webkit-overflow-scrolling:touch}
.tb button{padding:14px 28px;background:none;border:none;color:#607590;cursor:pointer;font-size:14px;font-weight:500;border-bottom:2px solid transparent;transition:all .25s;white-space:nowrap;position:relative}
.tb button:hover{color:#b0c0d8;background:rgba(255,255,255,0.03)}
.tb button.on{color:#a78bfa;border-bottom-color:#a78bfa;background:rgba(167,139,250,0.06)}
.tb button .badge{display:inline-block;margin-left:6px;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:700;background:rgba(167,139,250,0.2);color:#a78bfa}
.tb button.on .badge{background:rgba(167,139,250,0.35)}

/* ── Tab Content ── */
.tc{display:none;padding:28px 36px}
.tc.on{display:block}

/* ── Pool Grid ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:22px}

/* ── Collapsible Card ── */
.card{background:rgba(15,12,30,0.7);border:1px solid rgba(255,255,255,0.08);border-radius:14px;overflow:hidden;transition:border-color .25s,box-shadow .25s}
.card:hover{border-color:rgba(255,255,255,0.14);box-shadow:0 4px 24px rgba(0,0,0,0.3)}
.card-header{padding:18px 20px;cursor:pointer;user-select:none;display:flex;align-items:flex-start;gap:14px;transition:background .2s}
.card-header:hover{background:rgba(255,255,255,0.025)}
.card-header .pool-badge{flex-shrink:0;font-size:11px;font-weight:800;padding:4px 10px;border-radius:6px;color:#fff;letter-spacing:0.5px;margin-top:1px}
.card-header .pool-info{flex:1;min-width:0}
.card-header .pool-info h3{font-size:17px;font-weight:700;color:#e8e8f0;margin-bottom:4px;line-height:1.3}
.card-header .pool-info .pool-subtitle{font-size:12px;color:#607590;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-header .pool-meta{display:flex;gap:16px;margin-top:6px;font-size:12px}
.card-header .pool-meta span{color:#8090b0}
.card-header .pool-meta span b{color:#c8d0e0;font-weight:600}
.card-header .chevron{flex-shrink:0;font-size:20px;color:#506080;transition:transform .3s;width:24px;text-align:center;line-height:1}
.card.expanded .card-header .chevron{transform:rotate(90deg)}

/* ── Card Body (collapsed by default) ── */
.card-body{display:none;padding:0 20px 20px;border-top:1px solid rgba(255,255,255,0.06)}
.card.expanded .card-body{display:block}

/* ── Keywords ── */
.kw{display:flex;flex-wrap:wrap;gap:6px;margin:14px 0 10px}
.kw span{font-size:11px;padding:4px 10px;border-radius:14px;background:rgba(167,139,250,0.12);color:#c4b5fd;font-weight:500}
.kw .ai-topic{background:rgba(34,211,238,0.1);color:#67e8f9;font-size:11px;padding:4px 10px;border-radius:14px;font-weight:500}
.kw .ai-topic .count{color:#a5f3fc;font-size:10px;margin-left:4px}

/* ── Top Videos ── */
.vl{list-style:none;margin:8px 0}
.vl li{padding:7px 10px;border-radius:8px;transition:background .15s;display:flex;align-items:center;gap:8px;border:1px solid transparent}
.vl li:hover{background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.06)}
.vl li .rank{font-size:11px;font-weight:800;color:#506080;width:20px;flex-shrink:0;text-align:center}
.vl li a{color:#a78bfa;text-decoration:none;font-size:13px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:color .15s}
.vl li a:hover{color:#c4b5fd;text-decoration:underline}
.vl li .vid-views{font-size:11px;color:#7080a0;font-weight:600;white-space:nowrap;flex-shrink:0}
.vl li .vid-channel{font-size:10px;color:#506080;white-space:nowrap;flex-shrink:0;max-width:120px;overflow:hidden;text-overflow:ellipsis}

/* ── Channels row ── */
.ch-row{font-size:11px;color:#607590;margin:6px 0;display:flex;flex-wrap:wrap;gap:4px 12px}
.ch-row b{color:#8090b0;font-weight:600}

/* ── AI Section ── */
.ais{margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.06)}
.ais .ais-title{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#506080;font-weight:700;margin-bottom:8px}
.ais .seg{background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.05);border-radius:10px;padding:12px 14px;margin-bottom:8px;transition:border-color .15s}
.ais .seg:hover{border-color:rgba(255,255,255,0.1)}
.ais .seg .seg-name{font-size:13px;font-weight:700;color:#c8d0e0;margin-bottom:3px}
.ais .seg .seg-pct{font-size:11px;color:#a78bfa;font-weight:600}
.ais .seg .seg-drivers{font-size:11px;color:#7080a0;margin-top:4px;line-height:1.5}
.ais .seg .seg-drivers span{display:inline-block;background:rgba(167,139,250,0.08);padding:2px 8px;border-radius:10px;margin:1px 3px 1px 0}
.ais .gap{background:rgba(253,203,110,0.05);border:1px solid rgba(253,203,110,0.12);border-radius:10px;padding:12px 14px;margin-bottom:8px;position:relative}
.ais .gap .gap-topic{font-size:13px;font-weight:700;color:#fde68a;margin-bottom:4px}
.ais .gap .gap-level{display:inline-block;font-size:10px;font-weight:800;padding:2px 8px;border-radius:10px;letter-spacing:0.5px;margin-bottom:4px}
.ais .gap .gap-level.high{background:rgba(255,107,107,0.2);color:#ff6b6b}
.ais .gap .gap-level.medium{background:rgba(253,203,110,0.2);color:#fde68a}
.ais .gap .gap-level.emerging{background:rgba(52,211,153,0.2);color:#34d399}
.ais .gap .gap-opp{font-size:11px;color:#8090b0;margin-top:3px;line-height:1.5}
.ais .hook-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:#7080a0;margin:4px 0}
.ais .hook-badge .bar{width:80px;height:5px;border-radius:3px;background:rgba(255,255,255,0.08);overflow:hidden}
.ais .hook-badge .bar .fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#a78bfa,#22d3ee);transition:width .5s}

/* ── Network Graph ── */
#gc{width:100%;height:650px;border-radius:14px;background:#0f0c1e;border:1px solid rgba(255,255,255,0.08)}

/* ── Tables ── */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{padding:12px 16px;text-align:left;background:rgba(255,255,255,0.04);font-weight:600;color:#8090b0;border-bottom:2px solid rgba(255,255,255,0.08);font-size:12px;letter-spacing:0.5px;text-transform:uppercase}
.tbl td{padding:10px 16px;border-bottom:1px solid rgba(255,255,255,0.04);vertical-align:middle}
.tbl tr:hover td{background:rgba(255,255,255,0.02)}
.tbl a{color:#74B9FF;text-decoration:none;transition:color .15s}
.tbl a:hover{color:#a5d8ff;text-decoration:underline}
.tbl .dup-count{color:#FDCB6E;font-weight:700;font-size:14px}
.tbl .views-cell{color:#c8d0e0;font-weight:600}

/* ── Section Headers ── */
.sec-hd{font-size:13px;font-weight:700;color:#506080;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sec-hd::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.05)}

/* ── Empty State ── */
.empty{text-align:center;color:#506080;padding:60px 20px;font-size:14px}

/* ── Responsive ── */
@media(max-width:768px){.grid{grid-template-columns:1fr}}
</style></head><body>

\": \"none\", \"evidence\": \"現有的熱門影片主要圍繞著年輕父母與孩子或夫妻之間的互動。沒有影片特別聚焦於祖父母與孫輩、或老年家庭成員與年輕世代之間的文化、科技代溝或生活習慣差異所產生的喜劇效果。\", \"opportunity\": \"隨著社會高齡化，祖父母在家庭中的角色日益重要。這是一個尚未被充分挖掘的領域，可以藉由呈現祖父母的智慧與現代生活的衝擊、對新科技的笨拙嘗試，或隔代之間的可愛誤解，創造出溫馨又爆笑的內容，同時吸引年輕與年長世代的觀眾。\"}, {\"topic\": \"搞笑家庭挑戰與遊戲\", \"demand_level\": \"emerging\", \"current_coverage\": \"none\", \"evidence\": \"目前的熱門影片多為情境短劇或生活片段的觀察式幽默。沒有影片是將家庭成員置於特定的遊戲、挑戰或任務中，透過他們的反應、合作或競爭來製造喜劇效果。\", \"opportunity\": \"家庭挑戰或遊戲內容具有高度的互動性和不可預測性，觀眾喜歡看真實的反應和意外的結果。這類內容不僅能展現家庭成員之間的真實化學反應，也能提供輕鬆愉快的觀看體驗，容易激發觀眾的參與感和分享慾。\"}, {\"topic\": \"單親家庭或重組家庭的日常喜劇\", \"demand_level\": \"emerging\", \"current_coverage\": \"none\", \"evidence\": \"『家庭』的定義在現代社會日趨多元，但現有的熱門影片多數暗示著傳統的核心家庭或雙親家庭模式。沒有影片專門探討單親或重組家庭特有的日常挑戰與溫馨幽默，例如如何與繼親相處、單親育兒的趣事等。\", \"opportunity\": \"這是一個能與特定觀眾群建立深度連結的機會。透過呈現單親或重組家庭的獨特視角，創作者可以提供高度相關且具共鳴的幽默內容，幫助這些觀眾群感受到被理解和代表，同時也讓其他觀眾了解不同家庭模式的魅力。\"}, {\"topic\": \"以喜劇形式呈現的家庭生活『生存指南』或『攻略』\", \"demand_level\": \"medium\", \"current_coverage\": \"none\", \"evidence\": \"現有影片多是呈現家庭生活中的某個搞笑瞬間或情境，而非以喜劇教學或諷刺性『如何做』的形式來包裝。例如，沒有影片會以誇張或幽默的方式來教你『如何在家庭聚會中避免尷尬』或『如何處理小孩的爆笑謊言』。\", \"opportunity\": \"這種形式結合了資訊（即使是諷刺性的）和娛樂，能以全新的視角解讀家庭生活中的常見問題。創作者可以利用情境短劇、誇張的角色扮演或旁白，為觀眾提供一個幽默的『解決方案』或『應對策略』，既好笑又具巧思，容易創造出系列內容。\"}]}", "modularity_contribution": 0.0}, {"pool_id": 2, "name": "羅布短劇", "description": "", "videos": ["DRgUveP1k8I", "74rS0Kd9BE8", "zDxn4LzoMPA", "5pZhZfNnpIU", "Puse2R-WOJU", "LFGUfz8Ds_M", "DXzFW8Dr9oE", "6gE9eo6Rc9g", "a39J-lhhCaE", "gidXqIXDSRM", "V6m2FZojvXs", "NqUgN1yGhAk", "5pJGBn7sOME", "rkcfz77PG1k", "jtw_fzvQ5nY", "cK-H-Dq917M", "dVGB4oZn5nI", "VuAcmzADn6U", "ItQX2Gv60I0", "7FpRlcWlc6o", "xadwfVFfdSU", "14q9PVRULqg", "ZV-Xs1UfJh0", "CviXU4Y3qr0", "A5AEy9WyqY4", "h_HJs7Vulcc", "CCKpG5Y2oQA", "nJFz0hj1FjY", "KrZ9GKIFzBo", "BG-WsbIXeWA", "ALdfBiOUT6o", "SNZIaD3BceQ", "zTN7AGSrn9M", "vNSOZFORX40", "qwrVwXWdnWg"], "video_count": 35, "total_views": 678899949, "top_videos": [{"video_id": "h_HJs7Vulcc", "title": "every school problem #pmdamiann #roblox #robloxanimatio  \"none\", \"evidence\": \"現有熱門影片主要聚焦於羅布樂思世界內的「原創」幽默情境。然而，將外部的流行文化元素（如電影橋段、名人語錄、熱門迷因）巧妙地融入羅布樂思動畫中，將能創造出極具新穎感和廣泛共鳴的內容。\", \"opportunity\": \"借助流行文化的熱度與知名度，吸引非羅布樂思玩家甚至更廣泛的網路社群觀看，極具病毒式傳播潛力，同時展現創作者的創意與改編能力，擴展頻道受眾的邊界。\"}, {\"topic\": \"羅布樂思世界觀下的「超現實/荒謬邏輯」動畫\", \"demand_level\": \"emerging\", \"current_coverage\": \"none\", \"evidence\": \"現有影片的幽默感主要來自於對現實情境的誇張與共鳴。較少有完全打破現實邏輯，創造純粹荒謬或超現實故事情節的羅布樂思動畫。\", \"opportunity\": \"提供獨特的「腦洞大開」式幽默，能讓內容在眾多模仿現實的短片中脫穎而出。這種風格的內容往往具有極高的記憶點和轉發性，容易製造病毒式傳播，吸引追求新奇與非傳統幽默的觀眾。\"}]}", "modularity_contribution": 0.0}, {"pool_id": 3, "name": "男女趣味剪", "description": "", "videos": ["pN_kCx9bSAA", "GNHHrLAMTHw", "LrCUyESA2v4", "apBavwiizHo", "3yaOdbvXzbU", "ME230AHKmqg", "Bt0adHinLZc", "H5nsTnqC0hA", "-UKWfkXJaGo", "zujzHdXBwzo", "92bjvSf8ep0", "Y49A8L94umw", "jz7oT36cnlQ", "S-6dGAdm4WI", "XN9yWOKqH_k", "PhagsQXeyM4", "sdnuFhZ4QyE", "DyDs-2Aqzo0", "U-GFZpve72w", "tVn7V0Jz_x8", "uviFzfRcg-E", "ufmUL2Db6tg", "tKnJKBpF_ss", "B2oEBlHt29E", "2XSY6L6asDs", "xM2cmF8ohgo", "52iakmGtrJE", "fwWSro-HCP8", "VCWgQsmyVVw"], "video_count": 29, "total_views": 615623503, "top_videos": [{"video_id": "XN9yWOKqH_k", "title": "Triple sharpness test done!  #fyp #satisfying #kitchenknife #japaneseknife #ruiknife #cutting #sharp", "channel": "Raythesharpener", "view_count": 235701048}, {"video_id": "pN_kCx9bSAA", "title": "Boys vs Girls: Control The School | Alan's Universe", "channel": "Alan's Universe", "view_count": 92213082}, {"video_id": "fwWSro-HCP8", "title": "Boy Band vs. Girl Band | Alan’s Universe", "channel": "Alan's Universe", "view_count": 41659544}, {"video_id": "VCWgQsmyVVw", "title": "Girls driving vs Boys driving #trolface #troll #edit", "channel": "БЕХА ТВ", "view_count": 40276790}, {"video_id": "LrCUyESA2v4", "title": "They finally met at the world cup!❤️‍🩹 #ishowspeed", "channel": "Nexxo Recaps", "view_count": 24264057}], "top_channels": [{"name": "Alan's Universe", "videos": 2}, {"name": "Kenon Edits", "videos": 2}, {"name": "MerryMemes", "videos": 1}, {" 到放鬆或療癒的畫面\", \"能夠輕鬆分享給他人的內容\"]}], \"content_gaps\": [{\"topic\": \"更細緻且貼近生活的「男孩與女孩」情境對比\", \"demand_level\": \"high\", \"current_coverage\": \"low\", \"evidence\": \"現有熱門影片如《Boys vs Girls: Control The School》、《Girls driving vs Boys driving》多為廣泛、概括性且常帶有刻板印象的對比情境。這顯示出對於「男孩與女孩」差異性的探索有極高需求，但缺乏更具體、更日常、更少刻板印象且能引起廣泛共鳴的真實情境（例如：面對課業壓力、處理友情困境、選擇日常休閒活動、應對社交媒體挑戰等）。\", \"opportunity\": \"創作者可以透過觀察現代青少年的實際生活，製作更多元、更貼近現實、更具細節的比較內容。這能讓觀眾更容易產生共鳴，感受到內容的真實性與代入感，而非單純的娛樂，進而建立更深層次的觀眾連結和討論。這也允許創作者展現更多創意，避免重複既有的泛娛樂化內容。\"}, {\"topic\": \"鼓勵自我認同與打破性別刻板印象的「編輯」內容\", \"demand_level\": \"emerging\", \"current_coverage\": \"none\", \"evidence\": \"「edit」關鍵字在熱門影片中出現，但多數用於娛樂性（如《Girls driving vs Boys driving #trolface #troll #edit》）或名人粉絲剪輯（如《They finally met at the world cup!❤️‍🩹 #ishowspeed》）。現有內容鮮少運用「編輯」技巧來製作鼓勵個人成長、肯定多元性別特質、或挑戰傳統「男孩」、「女孩」刻板印象的短影音內容。\", \"opportunity\": \"隨著年輕世代對性別議題的關注度提高，運用精美的剪輯、動感的音樂和有力的文案，製作關於自我接納、性別流動性、友誼、獨立或追逐夢想等主題的短影音，能填補市場上缺乏此類正向、啟發性「編輯」內容的空白。這有助於建立一個更具包容性和支持性的社群，並吸引尋求意義和啟發的年輕觀眾。\"}, {\"topic\": \"粉絲與創作者互動的「男孩與女孩」挑戰或問答\", \"demand_level\": \"medium\", \"current_coverage\": \"none\", \"evidence\": \"現有影片均為單向內容輸出，缺乏引導觀眾參與互動的環節。例如，沒有看到發起挑戰、徵集觀眾意見或讓觀眾投票選擇情境發展的影片。儘管沒有留言資料，但根據 Shorts 的互動特性，觀眾通常喜歡被納入內容創造的過程。\", \"opportunity\": \"創作者可以發起「男孩 vs 女孩」的觀眾投稿挑戰（例如：『展示你的房間亂度』、『最有效的讀書方式』）、讓觀眾投票選出下一個對比情境、或是根據觀眾提出的問題來製作「男孩會怎麼做 vs 女孩會怎麼做」的問答 Shorts。這能大幅提升觀眾的參與感和忠誠度，將被動的觀看者轉變為主動的參與者，並為內容提供源源不絕的靈感。\"}, {\"topic\": \"結合特定次文化或小眾興趣的「男孩與女孩」反應/對比\", \"demand_level\": \"medium\", \"current_coverage\": \"low\", \"evidence\": \"現有內容的對比情境較為普遍（學校、駕駛、樂團）。這暗示著雖然廣泛的對比很受歡迎，但尚未充分挖掘特定興趣社群中，「男孩與女孩」之間獨特的行為模式、反應或偏好。例如：在遊戲社群、動漫迷、特定音樂類型愛好者、模型玩家等次文化中，他們的反應和選擇可能會呈現出有趣的差異。\", \"opportunity\": \"深入某個特定的次文化或小眾興趣領域，製作針對該領域的「男孩 vs 女孩」對比內容，可以精準地抓住該社群的觀眾。這些內容通常包含只有社群內部才懂的梗或行為，能有效建立高黏著度的粉絲群。例如：『男孩打遊戲時 vs 女孩打遊戲時的反應』、『追星男孩 vs 追星女孩的表現』等。這能讓內容更具特色和記憶點，跳脫普遍性主題的競爭。\"}, {\"topic\": \"「男孩與女孩」之間相互理解與合作的正面敘事\", \"demand_level\": \"emerging\", \"current_coverage\": \"none\", \"evidence\": \"現有影片多為強調差異性和對立性的對比（如《Boys vs Girls: Control The School》），或是純粹的編輯娛樂。很少看到以「男孩與女孩」為主題，卻聚焦於他們如何跨越差異、共同解決問題、互相支持或展現友誼與合作精神的內容。\", \"opportunity\": \"當市場上充斥著強調差異和衝突的內容時，製作關於「男孩與女孩」之間相互理解、合作、共同成長的正面敘事短影音，將會是獨特的藍海。這類內容能傳遞積極的訊息，推廣包容與尊重，吸引那些尋求正能量、溫馨或啟發性故事的觀眾。這不僅能區隔市場，也有助於建立一個更為成熟和正向的品牌形象。\"}]}", "modularity_contribution": 0.0}, {"pool_id": 4, "name": "菜鳥高手秀", "description": "", "videos": ["JlGAo-9Mh4I", "UO74NwuPqlk", "w6tLdmBTCY0", "HXxD41Vj57U", "fopRJmbhYgs", "lMNxWMhjMpU", "i7ww0TgWetM", "FJ3AL_p2TZs", "CXnU5GsMbbk", "eRFaJWibfVQ", "fK9mPG4kAfU", "h4-IcR_-JZc", "jce7Fp-FV3k", "qYM8AepLvUQ", "EwFmxMgZDyc", "yeKLXlPbJFM", "qiUjxFQc_Y8", "Z7t3Fh8inZM", "fL7Lp4ioFcw", "eq8_eBD1tUo", "vSLaOZJ5hKk", "QSIE_5GyjRA", "66_2WxXr_aI", "gGvdHMXnXmo", "we47leO9oDQ", "zcLrglm-O4I", "sZYt-R20cSs", "Rk4DlzpXJFc", "vu811sdJroE", "IEFGb7-eEeU", "felBYRGzVqA", "-8GQRj0rTY0", "VkEVgSC1zog", "_Oy0xGC-2hI", "8sJdVv5AYTs", "WgI3Xrgdl14", "2OcKKdcsd9M", "zQ1Oybgz3bk", "f1K8S0fG0do"], "video_count": 39, "total_views": 558353985, "top_videos": [{"video_id": "vSLaOZJ5hKk", "title": "Radmiru noob or pro? 🤔 #shorts", "channel": "radmiru", "view_count": 166472954}, {"video_id": "8sJdVv5AYTs", "title": "Minecraft NOOB vs PRO vs HACKER: Parkour!", "channel": "fvdge", "view_count": 48919382}, {"video_id": "fopRJmbhYgs", "title": "Noob vs. pro in Minecraft (part 2)", "channel": "Greg Renko", "view_count": 38687854}, {"video_id": "EwFmxMgZDyc", "title": "Por favor comparte con tus amigos #pov #herramientas #sketch #gracioso #actuation #historia", "channel": "Petteri Husen", "view_count": 35081638}, {"video_id": "jce7Fp-FV3k", "title": "DREAM vs OHIO vs NOOB vs PRO: Minecraft Parkour (World's Smallest Violin) #shorts", "channel": "ProShow", "view_count": 34393191}], "top_channels": [{"name": "osasart", "videos": 2}, {"name": "Angelic Lofi ASMR", "videos": 2}, {"name": "ProShow", "videos": 2}, {"name": "GEVids", "videos": 1}, {"name": "likeobby", "videos": 1}], "top_keywords": ["noob", "pro", "hacker", "minecraft", "god", "shorts", "roblox", "asmr", "bu 影片大量展示「noob vs pro」的對比，觀眾看到「pro」的技巧，自然會想知道如何達到該水準，甚至超越成為「god」。同時，「god」是利基關鍵字之一，但在熱門影片中未見以「god」為核心主題或深入教學的內容，暗示著觀眾可能存在「好想知道那些超強玩家是怎麼辦到的」或「為什麼沒有人教更進階的技巧」的需求。\", \"opportunity\": \"這能滿足觀眾渴望提升技能、學習頂尖玩家策略的深層需求。透過拆解「god」級玩家的操作、觀念或特殊技巧，提供實用且引人入勝的教學內容，創作者可以吸引追求卓越的遊戲玩家，並建立專業權威形象。\"}, {\"topic\": \"《Minecraft》其他遊戲模式的「Noob vs Pro」對決\", \"demand_level\": \"medium\", \"current_coverage\": \"low\", \"evidence\": \"多數現有熱門影片聚焦於《Minecraft》中的跑酷（Parkour），但《Minecraft》擁有豐富的遊戲模式，如生存（Survival）、PVP（玩家對戰）、建築（Building）、小遊戲（如 Bed Wars, SkyWars）等。雖然「Radmiru noob or pro?」影片證明「noob vs pro」的概念可應用於《Minecraft》以外的遊戲，但《Minecraft》本身的其他模式仍未被充分利用來進行這種有趣的對比。觀眾可能對看到「Noob vs Pro」在不同遊戲情境下的表現感興趣。\", \"opportunity\": \"拓展內容廣度，吸引對《Minecraft》其他遊戲模式感興趣的觀眾。透過引入新的遊戲情境和挑戰，可以創造新鮮感，避免內容疲勞，並展示「noob vs pro」概念的多樣性和趣味性。\"}, {\"topic\": \"「駭客」行為的分析、識別與防範教學\", \"demand_level\": \"emerging\", \"current_coverage\": \"none\", \"evidence\": \"「hacker」是利基關鍵字之一，且在部分熱門影片中作為「noob vs pro vs hacker」的對比元素出現，但內容僅限於展示駭客行為本身，缺乏深入的分析或教學。現有影片未探討駭客的常用手法、如何從遊戲畫面中識別駭客，或玩家應如何防範和應對。這暗示觀眾可能好奇「駭客是怎麼做到的？」、「我怎麼知道對方是不是駭客？」、「如何避免遇到駭客？」，但目前沒有影片回答這些問題。\", \"opportunity\": \"填補知識型內容的空白，滿足觀眾對遊戲安全、公平性以及了解幕後機制的好奇心。這類內容具有教育意義，能幫助玩家提升識別能力，同時也能引發社群討論，增強創作者的專業形象和社群貢獻度。\"}, {\"topic\": \"「菜鳥成長為高手」的劇情式 Shorts 系列\", \"demand_level\": \"high\", \"current_coverage\": \"low\", \"evidence\": \"現有影片多為單次性的「noob vs pro」對比，缺乏長期、有角色發展的敘事線。雖然「Noob vs. pro in Minecraft (part 2)」的出現表明觀眾對系列內容有需求，但現有系列可能仍以重複對比為主，而非完整的成長故事。觀眾可能渴望看到一個「菜鳥」角色，從一無所知到逐步精通的完整成長歷程，這能帶來更強的共鳴和情感投入，例如「好想看有人從零開始慢慢變強」這類需求。\", \"opportunity\": \"利用 Shorts 的系列功能，創造一個引人入勝的故事線，讓觀眾追隨角色的成長與挑戰。這種內容不僅能展示技巧，還能激發觀眾的勵志情緒，提高內容的黏著度，吸引長期訂閱和觀看。\"}, {\"topic\": \"將「Noob vs Pro」概念應用於非遊戲或日常生活場景\", \"demand_level\": \"medium\", \"current_coverage\": \"none\", \"evidence\": \"雖然大多數熱門影片集中在《Minecraft》等遊戲，但「noob vs pro」的核心概念（技巧高低對比）具有普適性。標題中包含「#pov #herramientas #sketch #gracioso #actuatio」的「Por favor comparte con tus amigos」影片雖然是孤例，但其非遊戲的「sketch」和生活化道具暗示了將誇張對比應用於現實情境的潛力。這表明觀眾對於幽默地將這種對比應用於烹飪、運動、手工藝或任何日常技能場景會有興趣，這是一個完全未被觸及的領域。\" function fm(n){
  if(n>=1e9) return (n/1e9).toFixed(1)+'B';
  if(n>=1e6) return (n/1e6).toFixed(0)+'M';
  if(n>=1e3) return (n/1e3).toFixed(0)+'K';
  return String(n);
}

function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

(function(){

  badg.textContent = POOLS.length;

      var gapsHtml = '';

// ═══════════════════════════════════════════════════════════════
// Network Graph via vis.js
// ═══════════════════════════════════════════════════════════════
var network=null;
function initGraph(){
  if(network) return;
  var c=document.getElementById('gc');
  var v2p={};
  POOLS.forEach(function(p){ p.videos.forEach(function(v){ v2p[v]=p.pool_id-1; }); });
  var nP=Math.max(POOLS.length,5);
  var nodes=new vis.DataSet((GRAPH.nodes||[]).map(function(n){
    var pi=v2p[n.video_id]!=null?v2p[n.video_id]:-1;
    var hue=(Math.max(pi,0)*360/nP)%360;
    var color=pi>=0?'hsl('+hue+',70%,55%)':'#ccc';
    var s=Math.max(8,Math.min(24,4+Math.log10((n.view_count||1000)+1)*2));
    return{
      id:n.video_id,
      label:(n.video_id||'?').substring(0,11),
      title:'<b>'+esc(n.title||'?')+'</b><br>Views: '+fm(n.view_count||0),
      size:s,color:color,font:{size:10,color:'#ccc'},borderWidth:1
    };
  }));
  var edges=new vis.DataSet((GRAPH.edges||[]).map(function(e){
    return{
      from:e.source,to:e.target,
      value:e.weight||0.1,
      width:Math.max(0.5,(e.weight||0.1)*8),
      title:'Weight: '+((e.weight||0).toFixed(4)),
      arrows:{to:{enabled:true,scaleFactor:0.6}},
      color:{opacity:Math.min(0.7,(e.weight||0.1)*3+0.1)},
      smooth:{enabled:false}
    };
  }));
  network=new vis.Network(c,{nodes:nodes,edges:edges},{
    physics:{
      solver:'barnesHut',
      barnesHut:{gravitationalConstant:-300,centralGravity:0.1,springLength:250,springConstant:0.02,damping:0.12},
      stabilization:{iterations:100},
      maxVelocity:15,minVelocity:0.1
    },
    interaction:{hover:true,tooltipDelay:200,dragNodes:true,zoomView:true,navigationButtons:true},
    edges:{smooth:{enabled:false}}
  });
  network.once('stabilized',function(){network.setOptions({physics:{enabled:false}});});
  network.on('click',function(p){if(p.nodes.length>0)window.open('https://www.youtube.com/shorts/'+p.nodes[0],'_blank');});
}
