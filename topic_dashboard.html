// Graph
var network=null;
function initGraph(){
if(network)return;
var c=document.getElementById('gc');
var v2p={};
POOLS.forEach(function(p){p.videos.forEach(function(v){v2p[v]=p.pool_id-1;});});
var nP=Math.max(POOLS.length,5);
var nodes=new vis.DataSet((GRAPH.nodes||[]).map(function(n){
var pi=v2p[n.video_id]!=null?v2p[n.video_id]:-1;
var hue=(Math.max(pi,0)*360/nP)%360;
var color=pi>=0?'hsl('+hue+',70%,55%)':'#ccc';
var s=Math.max(8,Math.min(24,4+Math.log10((n.view_count||1000)+1)*2));
return{id:n.video_id,label:(n.video_id||'?').substring(0,11),title:'<b>'+(n.title||'?')+'</b><br>Views: '+fm(n.view_count||0),size:s,color:color,font:{size:10,color:'#333'},borderWidth:1};
}));
var edges=new vis.DataSet((GRAPH.edges||[]).map(function(e){
return{from:e.source,to:e.target,value:e.weight||0.1,width:Math.max(0.5,(e.weight||0.1)*8),title:'Weight: '+((e.weight||0).toFixed(4)),arrows:{to:{enabled:true,scaleFactor:0.6}},color:{opacity:Math.min(0.7,(e.weight||0.1)*3+0.1)},smooth:{enabled:false}};
}));
network=new vis.Network(c,{nodes:nodes,edges:edges},{physics:{solver:'barnesHut',barnesHut:{gravitationalConstant:-300,centralGravity:0.1,springLength:250,springConstant:0.02,damping:0.12},stabilization:{iterations:100},maxVelocity:15,minVelocity:0.1},interaction:{hover:true,tooltipDelay:200,dragNodes:true,zoomView:true,navigationButtons:true},edges:{smooth:{enabled:false}}});
network.once('stabilized',function(){network.setOptions({physics:{enabled:false}});});
network.on('click',function(p){if(p.nodes.length>0)window.open('https://www.youtube.com/shorts/'+p.nodes[0],'_blank');});
}
