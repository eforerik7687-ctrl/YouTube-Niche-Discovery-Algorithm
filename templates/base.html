<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Niche Researcher{% endblock %}</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0b0e1a;color:#e0d8ff;font-family:'Inter','Segoe UI',sans-serif;min-height:100vh}
.header{background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);padding:18px 28px;display:flex;align-items:center;gap:24px;border-bottom:1px solid rgba(255,255,255,0.06)}
.header h1{font-weight:500;font-size:20px;color:#c8b8ff}
.header .nav{display:flex;gap:8px}
.header .nav a{padding:6px 14px;border-radius:6px;font-size:13px;color:#8878b0;text-decoration:none;transition:all 0.15s}
.header .nav a:hover{color:#c8b8ff;background:rgba(255,255,255,0.05)}
.header .nav a.active{color:#c8b8ff;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1)}
.container{max-width:1400px;margin:0 auto;padding:24px 28px}
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:20px;margin-bottom:16px}
.card h2{font-size:15px;font-weight:500;margin-bottom:12px;color:#c8b8ff}
.input-group{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.input-group input{flex:1;min-width:200px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px 14px;color:#fff;font-size:14px;outline:none}
.input-group input:focus{border-color:#8878b0}
.input-group input::placeholder{color:#554}
.btn{background:rgba(200,184,255,0.1);border:1px solid rgba(200,184,255,0.2);color:#c8b8ff;padding:10px 24px;border-radius:8px;cursor:pointer;font-size:14px;transition:all 0.15s}
.btn:hover{background:rgba(200,184,255,0.2)}
.btn-primary{background:#6b5cb0;border-color:#7b6cc0;color:#fff}
.btn-primary:hover{background:#7b6cc0}
.btn:disabled{opacity:0.4;cursor:not-allowed}

/* Loading bar */
.progress-wrap{display:none;margin:16px 0}
.progress-wrap.active{display:block}
.progress-bar{height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;margin-bottom:8px}
.progress-fill{height:100%;background:linear-gradient(90deg,#6b5cb0,#c8b8ff);width:0%;border-radius:3px;transition:width 0.3s}
.progress-text{font-size:12px;color:#8878b0;font-family:monospace;white-space:pre-wrap;max-height:200px;overflow-y:auto}

/* Tabs */
.tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:1px solid rgba(255,255,255,0.06)}
.tab{padding:10px 20px;font-size:13px;color:#8878b0;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s}
.tab:hover{color:#c8b8ff}
.tab.active{color:#c8b8ff;border-bottom-color:#c8b8ff}
.tab-content{display:none}
.tab-content.active{display:block}

/* Tables */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;color:#8878b0;font-weight:400;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid rgba(255,255,255,0.06)}
td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.03)}
tr:hover td{background:rgba(255,255,255,0.02)}
td a{color:#c8b8ff;text-decoration:none}
td a:hover{color:#fff;text-decoration:underline}
.niche-tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:12px;background:rgba(255,255,255,0.06)}
.opp-high{color:#60ff60}
.opp-mid{color:#c8ff60}
.opp-low{color:#ffc060}
.sort-links{font-size:12px;color:#8878b0;margin-bottom:8px}
.sort-links a{color:#8878b0;text-decoration:none;cursor:pointer;margin-right:8px}
.sort-links a:hover{color:#c8b8ff;text-decoration:underline}
.sort-links a.active{color:#c8b8ff}
.score-bar{display:inline-block;height:4px;border-radius:2px;vertical-align:middle;margin-right:6px}

/* Results area */
.results{display:none}
.results.active{display:block}
.result-links{display:flex;gap:12px;margin:12px 0;flex-wrap:wrap}
.result-links a{padding:8px 16px;background:rgba(200,184,255,0.06);border:1px solid rgba(200,184,255,0.12);border-radius:8px;color:#c8b8ff;text-decoration:none;font-size:13px}
.result-links a:hover{background:rgba(200,184,255,0.12)}
</style>
</head>
<body>
<div class="header">
  <h1>Niche Tools</h1>
  <div class="nav">
    <a href="/" class="{% if active == 'researcher' %}active{% endif %}">Researcher</a>
    <a href="/analyzer" class="{% if active == 'analyzer' %}active{% endif %}">Analyzer</a>
  </div>
</div>
<div class="container">
{% block content %}{% endblock %}
</div>
<script>
function fmt(v){if(v>=1e9)return (v/1e9).toFixed(1)+'B';if(v>=1e6)return (v/1e6).toFixed(1)+'M';if(v>=1e3)return (v/1e3).toFixed(1)+'K';return v}
</script>
</body>
</html>
