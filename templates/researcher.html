{% extends "base.html" %}
{% block title %}Niche Researcher{% endblock %}
{% block content %}

<div class="card">
  <h2>Niche Researcher</h2>
  <p style="color:#8878b0;font-size:13px;margin-bottom:16px">
    Discover blue ocean niches via keyword co-occurrence networks.
  </p>
  <div class="input-group">
    <input id="keywords" placeholder="Keywords (comma separated)" value="minecraft animation, roblox animation">
  </div>
  <div class="input-group">
    <input id="seedChannels" placeholder="Seed channels (optional, @handles comma separated)" value="">
  </div>
  <button id="runBtn" class="btn btn-primary" onclick="runPipeline()">▶ Run Pipeline</button>
</div>

<div id="progress" class="progress-wrap">
  <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
  <div id="progressText" class="progress-text"></div>
</div>

<div id="results" class="results">
  <div class="result-links" id="resultLinks"></div>
  <hr style="border-color:rgba(255,255,255,0.06);margin:16px 0">
  <h2 style="font-size:15px;font-weight:500;margin-bottom:12px;color:#c8b8ff">Niches</h2>
  <div id="nicheGrid" style="display:grid;grid-template-columns:1fr 1fr;gap:12px"></div>
</div>

<script>
function runPipeline(){
  const kw = document.getElementById('keywords').value.split(',').map(s=>s.trim()).filter(Boolean);
  const seeds = document.getElementById('seedChannels').value.split(',').map(s=>s.trim()).filter(Boolean);

  if(!kw.length && !seeds.length){alert('Enter keywords or seed channels');return}

  document.getElementById('runBtn').disabled = true;
  document.getElementById('progress').classList.add('active');
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('progressText').textContent = '';
  document.getElementById('results').classList.remove('active');
  document.getElementById('nicheGrid').innerHTML = '';

  const evtSource = new EventSource('/api/run_pipeline?keywords='+encodeURIComponent(JSON.stringify(kw))+'&seeds='+encodeURIComponent(JSON.stringify(seeds)));
  evtSource.onmessage = function(e){
    const msg = JSON.parse(e.data);
    if(msg.type === 'progress'){
      document.getElementById('progressFill').style.width = msg.pct + '%';
      document.getElementById('progressText').textContent += msg.text + '\n';
      document.getElementById('progressText').scrollTop = document.getElementById('progressText').scrollHeight;
    } else if(msg.type === 'done'){
      evtSource.close();
      document.getElementById('progressFill').style.width = '100%';
      document.getElementById('runBtn').disabled = false;
      showResults(msg.data);
    } else if(msg.type === 'error'){
      evtSource.close();
      document.getElementById('progressText').textContent += 'ERROR: ' + msg.text;
      document.getElementById('runBtn').disabled = false;
    }
  };
}

function showResults(data){
  document.getElementById('results').classList.add('active');

  // Links
  const links = document.getElementById('resultLinks');
  links.innerHTML = '';
  if(data.graph) links.innerHTML += '<a href="/file/'+data.graph+'" target="_blank">Network Graph</a>';
  if(data.wordcloud) links.innerHTML += '<a href="/file/'+data.wordcloud+'" target="_blank">Niche Report</a>';

  // Niches
  const grid = document.getElementById('nicheGrid');
  grid.innerHTML = '';

  if(!data.niches || !data.niches.length){
    grid.innerHTML = '<div style="color:#8878b0;padding:20px">No niches found.</div>';
    return;
  }

  data.niches.forEach(function(n){
    const card = document.createElement('div');
    card.style.cssText = 'background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:14px';
    card.innerHTML =
      '<div style="display:flex;align-items:baseline;gap:8px;margin-bottom:6px">' +
        '<span style="font-weight:600;font-size:14px;color:'+n.color+'">Niche '+n.id+'</span>' +
        '<span style="color:#8878b0;font-size:12px">'+n.channel_count+' ch · '+fmt(n.total_views)+' views</span>' +
        (n.keyword ? '<span style="font-size:11px;padding:1px 6px;border-radius:10px;background:rgba(255,255,255,0.06);color:#c8b8ff">'+n.keyword+'</span>' : '') +
      '</div>' +
      (n.description ? '<div style="font-size:12px;color:#a898c8;margin-bottom:8px;line-height:1.4">'+n.description+'</div>' : '') +
      '<div style="font-size:12px">' +
        (n.top_channels ? n.top_channels.map(function(ch,idx){
          const medal = idx===0?'&#129351;':idx===1?'&#129352;':'&#129353;';
          const url = ch.channelId ? 'https://www.youtube.com/channel/'+ch.channelId+'/shorts' : '#';
          return medal+' <a href="'+url+'" target="_blank" style="color:#c8b8ff;text-decoration:none">'+ch.name+'</a> <span style="color:#8878b0">'+ch.subs_display+'</span>';
        }).join('<br>') : ''
      ) +
      '</div>' +
      '<div style="margin-top:8px">' +
        '<a href="/niche/'+n.id+'" target="_blank" style="font-size:11px;color:#8878b0;text-decoration:none">Show all '+n.channel_count+' channels →</a>' +
      '</div>';
    grid.appendChild(card);
  });

  // Scroll to results
  document.getElementById('results').scrollIntoView({behavior:'smooth'});
}
</script>
{% endblock %}
