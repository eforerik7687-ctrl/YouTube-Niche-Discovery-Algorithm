/* ── Header ── */

.hd .st{display:flex;gap:36px;flex-wrap:wrap;font-size:13px;color:#7080a0}
.hd .st .stat-item{display:flex;flex-direction:column;gap:2px}
.hd .st .stat-item .label{font-size:11px;text-transform:uppercase;letter-spacing:0.8px;color:#506080}
.hd .st .stat-item .value{font-size:18px;font-weight:700;color:var(--accent,#a78bfa)}

/* ── Tabs ── */
.tb{display:flex;gap:0;padding:0 36px;background:rgba(255,255,255,0.015);border-bottom:1px solid rgba(255,255,255,0.06);overflow-x:auto;-webkit-overflow-scrolling:touch}
.tb button{padding:14px 28px;background:none;border:none;color:#607590;cursor:pointer;font-size:14px;font-weight:500;border-bottom:2px solid transparent;transition:all .25s;white-space:nowrap;position:relative}
.tb button:hover{color:#b0c0d8;background:rgba(255,255,255,0.03)}
.tb button.on{color:#a78bfa;border-bottom-color:#a78bfa;background:rgba(167,139,250,0.06)}
.tb button .badge{display:inline-block;margin-left:6px;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:700;background:rgba(167,139,250,0.2);color:#a78bfa}
.tb button.on .badge{background:rgba(167,139,250,0.35)}

/* ── Tab Content ── */
.tc{display:none;padding:28px 36px}
.tc.on{display:block}

/* ── Pool Grid ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:22px}

/* ── Collapsible Card ── */
.card{background:rgba(15,12,30,0.7);border:1px solid rgba(255,255,255,0.08);border-radius:14px;overflow:hidden;transition:border-color .25s,box-shadow .25s}
.card:hover{border-color:rgba(255,255,255,0.14);box-shadow:0 4px 24px rgba(0,0,0,0.3)}
.card-header{padding:18px 20px;cursor:pointer;user-select:none;display:flex;align-items:flex-start;gap:14px;transition:background .2s}
.card-header:hover{background:rgba(255,255,255,0.025)}
.card-header .pool-badge{flex-shrink:0;font-size:11px;font-weight:800;padding:4px 10px;border-radius:6px;color:#fff;letter-spacing:0.5px;margin-top:1px}
.card-header .pool-info{flex:1;min-width:0}
.card-header .pool-info h3{font-size:17px;font-weight:700;color:#e8e8f0;margin-bottom:4px;line-height:1.3}
.card-header .pool-info .pool-subtitle{font-size:12px;color:#607590;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-header .pool-meta{display:flex;gap:16px;margin-top:6px;font-size:12px}
.card-header .pool-meta span{color:#8090b0}
.card-header .pool-meta span b{color:#c8d0e0;font-weight:600}
.card-header .chevron{flex-shrink:0;font-size:20px;color:#506080;transition:transform .3s;width:24px;text-align:center;line-height:1}
.card.expanded .card-header .chevron{transform:rotate(90deg)}

/* ── Card Body (collapsed by default) ── */
.card-body{display:none;padding:0 20px 20px;border-top:1px solid rgba(255,255,255,0.06)}
.card.expanded .card-body{display:block}

/* ── Keywords ── */
.kw{display:flex;flex-wrap:wrap;gap:6px;margin:14px 0 10px}
.kw span{font-size:11px;padding:4px 10px;border-radius:14px;background:rgba(167,139,250,0.12);color:#c4b5fd;font-weight:500}
.kw .ai-topic{background:rgba(34,211,238,0.1);color:#67e8f9;font-size:11px;padding:4px 10px;border-radius:14px;font-weight:500}
.kw .ai-topic .count{color:#a5f3fc;font-size:10px;margin-left:4px}

/* ── Top Videos ── */
.vl{list-style:none;margin:8px 0}
.vl li{padding:7px 10px;border-radius:8px;transition:background .15s;display:flex;align-items:center;gap:8px;border:1px solid transparent}
.vl li:hover{background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.06)}

.ais .seg .seg-pct{font-size:11px;color:#a78bfa;font-weight:600}

.ais .gap .gap-topic{font-size:13px;font-weight:700;color:#fde68a;margin-bottom:4px}

.ais .hook-badge .bar{width:80px;height:5px;border-radius:3px;background:rgba(255,255,255,0.08);overflow:hidden}
.ais .hook-badge .bar .fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#a78bfa,#22d3ee);transition:width .5s}

/* ── Empty State ── */
.empty{text-align:center;color:#506080;padding:60px 20px;font-size:14px}

/* ── Responsive ── */
@media(max-width:768px){.grid{grid-template-columns:1fr}}

        gapsHtml += gaps.slice(0,4).map(function(g){
          var lvl = esc(g.demand_level||'medium');
          return '<div class="gap"><div class="gap-topic">'+esc(g.topic||'?')+'</div><span class="gap-level '+lvl+'">'+lvl+'</span>'+ (g.opportunity?'<div class="gap-opp">'+esc(g.opportunity.substring(0,150))+(g.opportunity.length>150?'...':'')+'</div>':'') +'</div>';
        }).join('');
      }

      // ── Assemble AI section ──
      var hasAI = aiTopics || hookHtml || segsHtml || gapsHtml;
      if(hasAI){
        aiHtml = '<div class="ais">'+
          '<div class="ais-title">AI Analysis</div>'+
          (aiTopics?'<div class="kw">'+aiTopics+'</div>':'')+
          (hookHtml||'')+
          segsHtml+
          gapsHtml+
        '</div>';
      }
    }

    // ── Pool subtitle (description/theme) ──
    var subtitle = esc(p.description||p.content_theme||'');

    return '<div class="card'+(defaultExpanded?' expanded':'')+'" data-pool="'+poolKey+'" id="card-'+i+'">'+
      '<div class="card-header" data-card="'+i+'">'+
        '<span class="pool-badge" style="background:'+c+'">'+esc(p.name||'Pool '+p.pool_id).substring(0,3)+'</span>'+
        '<div class="pool-info">'+
          '<h3>'+esc(p.name||'Pool '+p.pool_id)+'</h3>'+
          (subtitle?'<div class="pool-subtitle">'+subtitle+'</div>':'')+
          '<div class="pool-meta">'+
            '<span><b>'+p.video_count+'</b> videos</span>'+
            '<span><b>'+fm(p.total_views)+'</b> views</span>'+
            (p.modularity_contribution?'<span>Q: <b>'+p.modularity_contribution.toFixed(4)+'</b></span>':'')+
          '</div>'+
        '</div>'+
        '<span class="chevron">&#9654;</span>'+
      '</div>'+
      '<div class="card-body">'+
        '<div class="kw">'+kw+'</div>'+
        (ch?'<div class="ch-row"><b>Channels:</b> '+ch+'</div>':'')+
        '<div class="sec-hd">Top 5 Videos</div>'+
        '<ul class="vl">'+tv+'</ul>'+
        aiHtml+
      '</div>'+
    '</div>';
  }).join('');

  // Save base expanded state
  if(defaultExpanded){
    POOLS.forEach(function(p,i){ expandedPools[i]=true; });
  }
})();

// ═══════════════════════════════════════════════════════════════
// Network Graph via vis.js
// ═══════════════════════════════════════════════════════════════
var network=null;
function initGraph(){
  if(network) return;
  var c=document.getElementById('gc');
  var v2p={};
  POOLS.forEach(function(p){ p.videos.forEach(function(v){ v2p[v]=p.pool_id-1; }); });
  var nP=Math.max(POOLS.length,5);
  var nodes=new vis.DataSet((GRAPH.nodes||[]).map(function(n){
    var pi=v2p[n.video_id]!=null?v2p[n.video_id]:-1;
    var hue=(Math.max(pi,0)*360/nP)%360;
    var color=pi>=0?'hsl('+hue+',70%,55%)':'#ccc';
    var s=Math.max(8,Math.min(24,4+Math.log10((n.view_count||1000)+1)*2));
    return{
      id:n.video_id,
      label:(n.video_id||'?').substring(0,11),
      title:'<b>'+esc(n.title||'?')+'</b><br>Views: '+fm(n.view_count||0),
      size:s,color:color,font:{size:10,color:'#ccc'},borderWidth:1
    };
  }));
  var edges=new vis.DataSet((GRAPH.edges||[]).map(function(e){
    return{
      from:e.source,to:e.target,
      value:e.weight||0.1,
      width:Math.max(0.5,(e.weight||0.1)*8),
      title:'Weight: '+((e.weight||0).toFixed(4)),
      arrows:{to:{enabled:true,scaleFactor:0.6}},
      color:{opacity:Math.min(0.7,(e.weight||0.1)*3+0.1)},
      smooth:{enabled:false}
    };
  }));
  network=new vis.Network(c,{nodes:nodes,edges:edges},{
    physics:{
      solver:'barnesHut',
      barnesHut:{gravitationalConstant:-300,centralGravity:0.1,springLength:250,springConstant:0.02,damping:0.12},
      stabilization:{iterations:100},
      maxVelocity:15,minVelocity:0.1
    },
    interaction:{hover:true,tooltipDelay:200,dragNodes:true,zoomView:true,navigationButtons:true},
    edges:{smooth:{enabled:false}}
  });
  network.once('stabilized',function(){network.setOptions({physics:{enabled:false}});});
  network.on('click',function(p){if(p.nodes.length>0)window.open('https://www.youtube.com/shorts/'+p.nodes[0],'_blank');});
}
