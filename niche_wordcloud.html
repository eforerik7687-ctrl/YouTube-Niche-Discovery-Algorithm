* { margin:0; padding:0; box-sizing:border-box; }
body {

h1 {

    margin-bottom: 6px;
}
.subtitle {
    text-align: center;
    color: #8878b0;
    font-size: 14px;
    margin-bottom: 32px;
}
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    max-width: 1200px;
    margin: 0 auto;
}
.niche-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 16px;
    backdrop-filter: blur(8px);
}
.niche-header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 8px;
    flex-wrap: wrap;
}
.niche-title {
    font-weight: 600;
    font-size: 16px;
}
.niche-count {
    color: #8878b0;
    font-size: 12px;
    font-weight: 400;
}
.niche-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 20px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    color: #c8b8ff;
}
.niche-desc {
    font-size: 13px;
    line-height: 1.5;
    color: #d0c8e0;
    margin: 6px 0 10px;
}
.channel-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
}
.channel-item {
    font-size: 12px;
    padding: 4px 8px;
    border-radius: 6px;
    background: rgba(255,255,255,0.03);
}
.channel-item a {
    color: #c8b8ff;
    text-decoration: none;
    font-weight: 500;
}
.channel-item a:hover {
    color: #fff;
    text-decoration: underline;
}
.channel-item .subs {
    color: #8878b0;
    font-size: 11px;
    margin-left: 4px;
}
.no-niches {
    text-align: center;
    color: #665;
    padding: 40px;
    font-style: italic;
}
</style>
</head>
